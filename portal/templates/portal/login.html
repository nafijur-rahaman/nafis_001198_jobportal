{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-lg">
            <div class="card-header bg-dark text-white text-center py-3">
                <h3 class="font-weight-light my-1">Login</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        {{ form.password }}
                        {% if form.errors %}
                            <div class="text-danger small mt-2">Invalid username or password.</div>
                        {% endif %}
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-dark btn-lg">Login</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-white">
                <div class="small"><a href="{% url 'register' %}" class="text-decoration-none">Need an account? Sign up!</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
