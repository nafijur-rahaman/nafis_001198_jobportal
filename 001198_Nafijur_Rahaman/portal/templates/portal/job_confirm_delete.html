{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-body text-center p-5">
                <div class="display-1 text-danger mb-3" aria-hidden="true">!</div>
                <h3 class="text-danger mb-4">Confirm Deletion</h3>
                <p class="fs-5 mb-4">Are you sure you want to permanently delete:<br> <strong class="text-dark">"{{ object.title }}"</strong>?</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'job-detail' object.id %}" class="btn btn-secondary btn-lg px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger btn-lg px-4">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
